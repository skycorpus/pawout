name: pawout
description: 강아지 산책 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  provider: ^6.1.2

  # Supabase (백엔드)
  supabase_flutter: ^2.3.4

  # 네트워킹
  http: ^1.2.0
  dio: ^5.4.0

  # 로컬 저장소
  shared_preferences: ^2.2.2
  
  # 위치 & 지도
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.3
  
  # 걸음수 센서
  pedometer: ^4.0.1
  
  # 이미지 처리
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # UI 관련
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  intl: ^0.19.0
  
  # 아이콘
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true